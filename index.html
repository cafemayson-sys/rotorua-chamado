<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Abrir chamado · Rotorua Inn</title>
<style>
  :root{ --bg:#0d1016; --card:#161b24; --line:#252c3a; --txt:#eef2f7; --sub:#8b97a7;
         --green:#4cd07d; --red:#ff5d5d; --amber:#ffc14d; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;min-height:100%;background:var(--bg);color:var(--txt);
            font-family:'Segoe UI',system-ui,-apple-system,Arial,sans-serif;}
  .wrap{max-width:480px;margin:0 auto;padding:30px 22px 48px;}
  .head{display:flex;align-items:center;gap:13px;margin-bottom:6px;}
  .head .ic{width:46px;height:46px;border-radius:13px;background:#1c2330;display:flex;
            align-items:center;justify-content:center;font-size:24px;}
  h1{font-size:24px;margin:0;font-weight:700;letter-spacing:.2px;}
  .sub{color:var(--sub);font-size:13px;}
  .field{margin-top:22px;}
  label{display:block;font-size:13px;color:var(--sub);margin-bottom:8px;font-weight:600;}
  input,textarea{width:100%;padding:15px;border-radius:13px;border:1px solid var(--line);
    background:var(--card);color:var(--txt);font-size:16px;outline:none;transition:border .15s;}
  input:focus,textarea:focus{border-color:var(--green);}
  textarea{min-height:96px;resize:vertical;}
  .seg{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .seg button{padding:15px;border-radius:13px;border:1px solid var(--line);background:var(--card);
    color:var(--sub);font-size:16px;font-weight:600;cursor:pointer;transition:all .15s;}
  .seg button.on{color:var(--txt);}
  .seg button[data-v="Normal"].on{border-color:var(--green);background:rgba(76,208,125,.12);color:var(--green);}
  .seg button[data-v="Urgente"].on{border-color:var(--red);background:rgba(255,93,93,.14);color:var(--red);}
  .go{width:100%;margin-top:30px;padding:17px;border:0;border-radius:14px;background:var(--green);
    color:#06210f;font-size:18px;font-weight:800;cursor:pointer;transition:transform .08s,opacity .2s;}
  .go:active{transform:scale(.985);}
  .go:disabled{opacity:.6;cursor:default;}
  /* sucesso */
  #ok{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;
      align-items:center;justify-content:center;text-align:center;padding:30px;}
  #ok.show{display:flex;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .check{width:96px;height:96px;border-radius:50%;background:rgba(76,208,125,.14);
    display:flex;align-items:center;justify-content:center;font-size:52px;
    animation:pop .35s cubic-bezier(.2,1.4,.5,1);}
  @keyframes pop{0%{transform:scale(.4);opacity:0}100%{transform:scale(1);opacity:1}}
  #ok h2{font-size:24px;margin:22px 0 6px;color:var(--green);}
  #ok p{color:var(--sub);margin:0;}
</style>
</head>
<body>
<div class="wrap" id="form">
  <div class="head">
    <div class="ic">🛠️</div>
    <div><h1>Abrir chamado</h1><div class="sub">Hotel Rotorua Inn · Manutenção</div></div>
  </div>

  <div class="field">
    <label>Local / Quarto</label>
    <input id="local" placeholder="ex: Quarto 302" autocomplete="off" autofocus>
  </div>
  <div class="field">
    <label>Qual o problema?</label>
    <textarea id="problema" placeholder="descreva rapidamente o que está acontecendo"></textarea>
  </div>
  <div class="field">
    <label>Urgência</label>
    <div class="seg" id="seg">
      <button type="button" data-v="Normal" class="on">Normal</button>
      <button type="button" data-v="Urgente">🔴 Urgente</button>
    </div>
  </div>
  <div class="field">
    <label>Quem está abrindo</label>
    <input id="solicitante" value="Recepção" autocomplete="off">
  </div>

  <button class="go" id="go">Abrir chamado</button>
</div>

<div id="ok">
  <div class="check">✅</div>
  <h2>Chamado aberto!</h2>
  <p>Já aparece no painel. Pode fechar.</p>
</div>

<script>
const FORM = "https://docs.google.com/forms/d/e/1FAIpQLSeZPm6OjWwJ1ynSZR_-NPw6UsR9q7Vw9Q_7UNazfwoddYsEJg/formResponse";
const E = { local:"entry.932192929", problema:"entry.1559822300", urgencia:"entry.694324571", solicitante:"entry.272119414" };

let urgencia = "Normal";
document.getElementById("seg").addEventListener("click", e=>{
  const b = e.target.closest("button"); if(!b) return;
  urgencia = b.dataset.v;
  [...document.querySelectorAll("#seg button")].forEach(x=>x.classList.toggle("on", x===b));
});

const go = document.getElementById("go");
go.addEventListener("click", ()=>{
  const local = document.getElementById("local").value.trim();
  const problema = document.getElementById("problema").value.trim();
  const solicitante = document.getElementById("solicitante").value.trim() || "Recepção";
  if(!local || !problema){ alert("Preencha o local e o problema."); return; }
  go.disabled = true; go.textContent = "Enviando...";
  const body = new URLSearchParams();
  body.append(E.local, local); body.append(E.problema, problema);
  body.append(E.urgencia, urgencia); body.append(E.solicitante, solicitante);
  fetch(FORM, { method:"POST", mode:"no-cors", body }).finally(()=>{
    document.getElementById("ok").classList.add("show");
    setTimeout(()=>{ // reseta pra o próximo chamado, rápido
      document.getElementById("local").value=""; document.getElementById("problema").value="";
      urgencia="Normal"; [...document.querySelectorAll("#seg button")].forEach(x=>x.classList.toggle("on", x.dataset.v==="Normal"));
      go.disabled=false; go.textContent="Abrir chamado";
      document.getElementById("ok").classList.remove("show");
      document.getElementById("local").focus();
    }, 2200);
  });
});
// Enter no campo Local pula pro problema; Ctrl+Enter envia
document.getElementById("local").addEventListener("keydown",e=>{ if(e.key==="Enter"){e.preventDefault();document.getElementById("problema").focus();}});
document.getElementById("problema").addEventListener("keydown",e=>{ if(e.key==="Enter"&&(e.ctrlKey||e.metaKey)){go.click();}});
</script>
</body>
</html>
