<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Manutenção · Rotorua Inn</title>
<style>
  :root{
    --bg:#0a0d13; --bg2:#0e131b; --card:#161c27; --card2:#1b2330; --line:#28313f;
    --txt:#f1f5fa; --sub:#8b97a9; --mut:#5c6677;
    --red:#ff5d6c; --amber:#ffb84d; --slate:#8a98b2; --green:#49d07f;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;min-height:100%;background:
    radial-gradient(1200px 460px at 50% -120px, #141c2b 0%, var(--bg) 60%) no-repeat var(--bg);
    color:var(--txt);font-family:'Segoe UI',system-ui,-apple-system,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;}
  .wrap{max-width:600px;margin:0 auto;padding:20px 16px calc(40px + env(safe-area-inset-bottom));}

  /* topo */
  header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  header .logo{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;
    font-size:24px;background:linear-gradient(150deg,#1d2736,#141b27);border:1px solid var(--line);}
  header h1{font-size:22px;margin:0;font-weight:800;letter-spacing:.2px;}
  header .sub{font-size:12px;color:var(--sub);margin-top:1px;}
  .me{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:11px 14px;margin-bottom:14px;}
  .me .ava{width:26px;height:26px;border-radius:50%;background:#243049;display:flex;align-items:center;
    justify-content:center;font-size:14px;flex:0 0 auto;}
  .me label{color:var(--sub);font-size:13px;white-space:nowrap;}
  .me input{flex:1;border:0;background:transparent;color:var(--txt);font-size:15px;outline:none;min-width:0;}

  /* filtros */
  .filtros{display:flex;gap:9px;overflow-x:auto;padding:2px 2px 10px;margin:0 -2px 6px;
    scrollbar-width:none;-ms-overflow-style:none;}
  .filtros::-webkit-scrollbar{display:none;}
  .fchip{flex:0 0 auto;border:1px solid var(--line);background:var(--card);color:var(--sub);
    border-radius:999px;padding:9px 15px;font-size:13.5px;font-weight:600;cursor:pointer;white-space:nowrap;
    transition:all .15s;display:flex;align-items:center;gap:7px;}
  .fchip b{font-size:13px;opacity:.95;}
  .fchip .dot{width:8px;height:8px;border-radius:50%;background:currentColor;}
  .fchip[data-f="pend"]{color:var(--red);} .fchip[data-f="and"]{color:var(--amber);}
  .fchip[data-f="paus"]{color:var(--slate);} .fchip[data-f="todos"]{color:#9fb0c7;}
  .fchip.on{background:var(--card2);border-color:currentColor;box-shadow:0 0 0 1px currentColor inset;}
  .fchip:not(.on) b{color:var(--txt);}

  /* cards */
  .card{background:linear-gradient(180deg,var(--card),#141a24);border:1px solid var(--line);
    border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 6px 18px -12px #000;
    transition:opacity .3s,transform .3s,background .3s,box-shadow .3s;}
  .card.urg{border-color:#46242c;box-shadow:0 0 0 1px #5a2730 inset,0 10px 26px -14px #ff3b4d55;}
  .card .ctop{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .card .loc{font-size:19px;font-weight:800;line-height:1.1;}
  .card .badges{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex:0 0 auto;}
  .chip{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:5px 11px;
    font-size:11.5px;font-weight:700;letter-spacing:.2px;white-space:nowrap;border:1px solid transparent;}
  .chip .d{width:7px;height:7px;border-radius:50%;background:currentColor;}
  .chip.pend{color:var(--red);background:rgba(255,93,108,.13);border-color:rgba(255,93,108,.28);}
  .chip.and{color:var(--amber);background:rgba(255,184,77,.13);border-color:rgba(255,184,77,.28);}
  .chip.paus{color:var(--slate);background:rgba(138,152,178,.14);border-color:rgba(138,152,178,.30);}
  .chip.urg{color:var(--red);background:rgba(255,59,77,.16);border-color:rgba(255,59,77,.4);}
  .card .prob{font-size:15.5px;color:#d7dee8;margin:9px 0 0;line-height:1.4;}
  .card .meta{font-size:12.5px;color:var(--mut);margin-top:8px;}
  .card .motivo{font-size:13.5px;color:#aeb9cd;background:rgba(138,152,178,.10);
    border-left:3px solid var(--slate);border-radius:8px;padding:9px 12px;margin-top:11px;}
  .card .motivo b{color:#cdd6e4;}
  .acts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
  .btn{min-height:50px;border:1px solid var(--line);border-radius:14px;font-size:15px;font-weight:700;
    cursor:pointer;background:var(--card2);color:var(--txt);display:flex;align-items:center;justify-content:center;
    gap:7px;transition:transform .07s,opacity .2s,filter .2s;}
  .btn:active{transform:scale(.97);}
  .btn.start{background:rgba(255,184,77,.15);border-color:rgba(255,184,77,.45);color:var(--amber);}
  .btn.pause{background:rgba(138,152,178,.13);border-color:rgba(138,152,178,.38);color:#aeb9cd;}
  .btn.done{background:rgba(73,208,127,.16);border-color:rgba(73,208,127,.45);color:var(--green);}
  .btn-link{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;margin-top:10px;
    background:transparent;border:0;color:var(--slate);font-size:14px;font-weight:600;cursor:pointer;
    padding:9px;border-radius:12px;}
  .btn-link:active{background:rgba(138,152,178,.08);}
  .card.busy{opacity:.5;pointer-events:none;}
  .card.flash{background:rgba(73,208,127,.16);border-color:rgba(73,208,127,.5);}
  .card.flash .acts,.card.flash .meta,.card.flash .motivo,.card.flash .btn-link{display:none;}
  .card.flash .done-msg{display:flex;}
  .done-msg{display:none;align-items:center;gap:8px;color:var(--green);font-weight:800;
    font-size:16px;margin-top:12px;}
  .card.gone{opacity:0;transform:translateX(46px);max-height:0;margin:0;padding-top:0;padding-bottom:0;
    border-width:0;overflow:hidden;}

  .empty{text-align:center;color:var(--mut);font-size:15px;padding:54px 12px;}
  .empty .big{font-size:46px;display:block;margin-bottom:12px;}

  /* resolvidos hoje */
  .resolv{margin-top:6px;}
  .resolv h3{font-size:13px;color:var(--sub);margin:0;cursor:pointer;display:flex;justify-content:space-between;
    align-items:center;font-weight:700;background:var(--card);border:1px solid var(--line);border-radius:13px;
    padding:13px 15px;user-select:none;}
  .resolv h3 .ch{color:var(--green);}
  .resolv h3 .arr{transition:transform .2s;color:var(--mut);}
  .resolv.open h3 .arr{transform:rotate(180deg);}
  .resolv .lista{margin-top:8px;display:none;}
  .resolv.open .lista{display:block;}
  .resolv .item{font-size:13.5px;color:var(--sub);padding:11px 14px;background:var(--bg2);
    border:1px solid var(--line);border-radius:11px;margin-bottom:7px;display:flex;justify-content:space-between;gap:10px;}
  .resolv .item b{color:#d7dee8;}
  .resolv .item .q{color:var(--mut);font-size:12px;white-space:nowrap;}

  footer{margin-top:18px;text-align:center;font-size:11px;color:var(--mut);}
  .live{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);
    margin-right:5px;vertical-align:middle;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(90px);
    background:#0f2a1c;color:var(--green);border:1px solid rgba(73,208,127,.55);padding:13px 20px;
    border-radius:13px;font-size:14.5px;font-weight:700;opacity:0;transition:all .25s;z-index:30;
    box-shadow:0 12px 30px -10px #000;}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

  /* folha de pausa */
  .sheet-bg{position:fixed;inset:0;background:rgba(4,6,10,.6);backdrop-filter:blur(2px);opacity:0;
    pointer-events:none;transition:opacity .2s;z-index:40;}
  .sheet-bg.show{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--line);
    border-radius:22px 22px 0 0;padding:10px 18px calc(20px + env(safe-area-inset-bottom));z-index:50;
    max-width:600px;margin:0 auto;transform:translateY(110%);transition:transform .26s cubic-bezier(.2,.9,.3,1);
    box-shadow:0 -16px 40px -16px #000;}
  .sheet.show{transform:translateY(0);}
  .sheet .grip{width:42px;height:5px;border-radius:3px;background:#33405220;background:#3a4658;margin:6px auto 14px;}
  .sheet h3{margin:0 0 4px;font-size:18px;font-weight:800;}
  .sheet p{margin:0 0 12px;font-size:13.5px;color:var(--sub);}
  .sheet textarea{width:100%;min-height:90px;border-radius:13px;border:1px solid var(--line);
    background:var(--bg2);color:var(--txt);font-size:15.5px;padding:13px;outline:none;resize:vertical;}
  .sheet textarea:focus{border-color:var(--slate);}
  .sheet .sheet-acts{display:grid;grid-template-columns:1fr 1.4fr;gap:11px;margin-top:14px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">🛠️</div>
    <div><h1>Manutenção</h1><div class="sub">Hotel Rotorua Inn</div></div>
  </header>

  <div class="me">
    <span class="ava">👤</span>
    <label>Você é</label>
    <input id="me" placeholder="seu nome" autocomplete="off">
  </div>

  <div class="filtros" id="filtros">
    <button class="fchip on" data-f="todos"><span class="dot"></span>Todos <b id="f-todos">0</b></button>
    <button class="fchip" data-f="pend"><span class="dot"></span>Pendentes <b id="f-pend">0</b></button>
    <button class="fchip" data-f="and"><span class="dot"></span>Em andamento <b id="f-and">0</b></button>
    <button class="fchip" data-f="paus"><span class="dot"></span>Pausados <b id="f-paus">0</b></button>
  </div>

  <div id="list"></div>

  <div class="resolv" id="resolv">
    <h3 onclick="document.getElementById('resolv').classList.toggle('open')">
      <span><span class="ch">✓</span> Resolvidos hoje (<span id="c-res">0</span>)</span>
      <span class="arr">▾</span>
    </h3>
    <div class="lista" id="lista-res"></div>
  </div>

  <footer><span class="live"></span><span id="status">carregando…</span></footer>
</div>

<div class="toast" id="toast"></div>
<div class="sheet-bg" id="sheetBg" onclick="fecharSheet()"></div>
<div class="sheet" id="sheet">
  <div class="grip"></div>
  <h3>Pausar chamado <span id="sheetId"></span></h3>
  <p>Por que está pausando? (ex: falta de material, aguardando peça)</p>
  <textarea id="motivo" placeholder="motivo da pausa"></textarea>
  <div class="sheet-acts">
    <button class="btn" onclick="fecharSheet()">Cancelar</button>
    <button class="btn pause" onclick="confirmarPausa()">⏸ Confirmar pausa</button>
  </div>
</div>

<script>
const SHEET_ID  = "1ADR5V0QzwKopeke4DBPJXaRT4vWf-bbOE3J7O_AU--A";
const SHEET_NAME= "CHAMADOS";
const FORM = "https://docs.google.com/forms/d/e/1FAIpQLSeZPm6OjWwJ1ynSZR_-NPw6UsR9q7Vw9Q_7UNazfwoddYsEJg/formResponse";
const E = { local:"entry.932192929", problema:"entry.1559822300", urgencia:"entry.694324571", solicitante:"entry.272119414" };
const MARCA = "__UPDATE__";

const $ = s => document.getElementById(s);
const meInput = $("me");
meInput.value = localStorage.getItem("manut_nome") || "";
meInput.addEventListener("input", ()=> localStorage.setItem("manut_nome", meInput.value.trim()));

function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function val(r,i){ const c=r.c[i]; return c && c.v!=null ? (""+c.v).trim() : ""; }
function isUrg(u){ return (u||"").toLowerCase().indexOf("urg")>=0; }
function key(s){ s=(s||"").toLowerCase();
  return s.indexOf("resolv")>=0?"res":s.indexOf("paus")>=0?"paus":s.indexOf("andamento")>=0?"and":"pend"; }
function hojeDM(){ const d=new Date(); return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0"); }
const ROTULO = { pend:"Pendente", and:"Em andamento", paus:"Pausado" };

let ULTIMO = [];           // últimos chamados lidos (pra re-render ao trocar filtro)
let FILTRO = "todos";

const pending = {};        // otimista grudento: id -> { status, obs, t }
function aplicarPend(o){
  const p = pending[o.id]; if(!p) return o;
  if(Date.now()-p.t > 180000){ delete pending[o.id]; return o; }
  if(key(o.status)===key(p.status)){ delete pending[o.id]; return o; }
  return Object.assign({}, o, { status:p.status, obs:(p.obs!=null&&p.obs!=="")?p.obs:o.obs });
}

$("filtros").addEventListener("click", e=>{
  const b=e.target.closest(".fchip"); if(!b) return;
  FILTRO=b.dataset.f;
  [].forEach.call(document.querySelectorAll(".fchip"), x=>x.classList.toggle("on", x===b));
  desenhar();
});

function desenhar(){
  const todos = ULTIMO.filter(o=>o.local!==MARCA).map(aplicarPend);
  const abertos = todos.filter(o=>["pend","and","paus"].indexOf(key(o.status))>=0);
  const cont = { pend:0, and:0, paus:0 };
  abertos.forEach(o=>cont[key(o.status)]++);
  $("f-todos").textContent=abertos.length; $("f-pend").textContent=cont.pend;
  $("f-and").textContent=cont.and; $("f-paus").textContent=cont.paus;

  let lista = abertos;
  if(FILTRO!=="todos") lista = abertos.filter(o=>key(o.status)===FILTRO);
  const ordem = { pend:0, and:1, paus:2 };
  lista.sort((a,b)=>{
    const ua=isUrg(a.urgencia)?0:1, ub=isUrg(b.urgencia)?0:1; if(ua!==ub) return ua-ub;
    return ordem[key(a.status)]-ordem[key(b.status)];
  });
  $("list").innerHTML = lista.length ? lista.map(card).join("")
    : '<div class="empty"><span class="big">✅</span>'
      +(FILTRO==="todos"?"Tudo em dia, nenhum chamado aberto.":"Nada aqui agora.")+'</div>';

  const res = todos.filter(o=>key(o.status)==="res" && (o.resolvido||"").indexOf(hojeDM())===0);
  $("c-res").textContent = res.length;
  $("lista-res").innerHTML = res.length
    ? res.map(o=>'<div class="item"><span><b>'+esc(o.local||"-")+'</b> · '+esc(o.problema||"")+'</span>'
        +'<span class="q">'+esc(o.resolvido||"")+' · '+esc(o.responsavel||"-")+'</span></div>').join("")
    : '<div class="item">nenhum ainda hoje</div>';
}

function card(o){
  const k = key(o.status), urg = isUrg(o.urgencia);
  const badges = '<div class="badges">'
    + (urg ? '<span class="chip urg"><span class="d"></span>Urgente</span>' : '')
    + '<span class="chip '+k+'"><span class="d"></span>'+ROTULO[k]+'</span></div>';
  const meta = k==="paus" ? ("#"+o.id+" · pausado por "+(o.responsavel||"-"))
            : k==="and"  ? ("#"+o.id+" · desde "+(o.inicio||o.aberto||"")+" · "+(o.responsavel||"-"))
            :              ("#"+o.id+" · aberto "+(o.aberto||"")+" · "+(o.solicitante||"recepção"));
  const motivo = (k==="paus" && o.obs) ? '<div class="motivo"><b>Pausa:</b> '+esc(o.obs)+'</div>' : '';
  let acts;
  if(k==="pend"){
    acts = '<div class="acts">'
      +'<button class="btn start" onclick="acao(\''+o.id+'\',\'Em andamento\')">▶ Iniciar</button>'
      +'<button class="btn done" onclick="acao(\''+o.id+'\',\'Resolvido\')">✓ Resolver</button></div>'
      +'<button class="btn-link" onclick="pedirPausa(\''+o.id+'\')">⏸ Pausar (falta material, etc.)</button>';
  } else if(k==="and"){
    acts = '<div class="acts">'
      +'<button class="btn pause" onclick="pedirPausa(\''+o.id+'\')">⏸ Pausar</button>'
      +'<button class="btn done" onclick="acao(\''+o.id+'\',\'Resolvido\')">✓ Resolver</button></div>';
  } else {
    acts = '<div class="acts">'
      +'<button class="btn start" onclick="acao(\''+o.id+'\',\'Em andamento\')">▶ Retomar</button>'
      +'<button class="btn done" onclick="acao(\''+o.id+'\',\'Resolvido\')">✓ Resolver</button></div>';
  }
  return '<div class="card '+(urg?"urg":"")+'" data-id="'+esc(o.id)+'">'
    +'<div class="ctop"><div class="loc">'+esc(o.local||"-")+'</div>'+badges+'</div>'
    +'<div class="prob">'+esc(o.problema||"")+'</div>'+motivo
    +'<div class="meta">'+esc(meta)+'</div>'+acts
    +'<div class="done-msg">✓ Resolvido</div></div>';
}

function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2200); }

let pausaId = null;
function pedirPausa(id){ pausaId=id; $("sheetId").textContent="#"+id; $("motivo").value="";
  $("sheetBg").classList.add("show"); $("sheet").classList.add("show");
  setTimeout(()=>$("motivo").focus(), 280); }
function fecharSheet(){ $("sheetBg").classList.remove("show"); $("sheet").classList.remove("show"); pausaId=null; }
function confirmarPausa(){ const m=$("motivo").value.trim(); if(!m){ $("motivo").focus(); return; }
  const id=pausaId; fecharSheet(); acao(id,"Pausado",m); }

function acao(id, novo, obs){
  obs = obs || "";
  const cardEl = document.querySelector('.card[data-id="'+id+'"]');
  const quem = meInput.value.trim() || "Manutenção";
  pending[id] = { status:novo, obs:obs, t:Date.now() };
  if(cardEl){
    cardEl.classList.add("busy");
    if(novo==="Resolvido"){ cardEl.classList.remove("busy"); cardEl.classList.add("flash");
      setTimeout(()=>cardEl.classList.add("gone"), 1300); }
  }
  const body = new URLSearchParams();
  body.append(E.local, MARCA);
  body.append(E.problema, id+"|"+novo+"|"+quem+(obs?("|"+obs):""));
  body.append(E.urgencia, "Normal");
  body.append(E.solicitante, quem);
  fetch(FORM, { method:"POST", mode:"no-cors", body }).finally(()=>{
    toast(novo==="Resolvido" ? "Chamado #"+id+" resolvido ✓"
        : novo==="Pausado"   ? "Chamado #"+id+" pausado ⏸"
        :                      "Chamado #"+id+" em andamento ▶");
    setTimeout(carregar, 2500);
  });
}

window.__gvizcb = function(resp){
  try{
    const rows=(resp.table&&resp.table.rows)||[]; const objs=[];
    rows.forEach(r=>{ if(!r||!r.c) return;
      if(val(r,0).toLowerCase()==="id") return;
      const status=val(r,6); if(!status) return;
      objs.push({ id:val(r,0), aberto:val(r,1), local:val(r,2), problema:val(r,3),
                  urgencia:val(r,4), solicitante:val(r,5), status:status,
                  responsavel:val(r,7), inicio:val(r,8), resolvido:val(r,9), obs:val(r,10) }); });
    ULTIMO = objs; desenhar();
    $("status").textContent = "atualizado " + new Date().toLocaleTimeString("pt-BR");
  }catch(e){ $("status").textContent="erro ao ler a planilha"; }
};
function carregar(){
  const old=$("gvizscript"); if(old) old.remove();
  const s=document.createElement("script"); s.id="gvizscript";
  s.onerror=()=>{ $("status").textContent="sem conexão com a planilha"; };
  s.src="https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/gviz/tq?tqx=out:json;responseHandler:__gvizcb&sheet="+SHEET_NAME+"&_="+Date.now();
  document.head.appendChild(s);
}
carregar(); setInterval(carregar, 15000);
</script>
</body>
</html>
