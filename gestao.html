<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Manutenção · chamados</title>
<style>
  :root{ --bg:#0d1016; --card:#161b24; --line:#252c3a; --txt:#eef2f7; --sub:#8b97a7;
         --green:#4cd07d; --red:#ff5d5d; --amber:#ffc14d; --slate:#7d8aa3; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;min-height:100%;background:var(--bg);color:var(--txt);
            font-family:'Segoe UI',system-ui,-apple-system,Arial,sans-serif;}
  .wrap{max-width:560px;margin:0 auto;padding:18px 16px 44px;}
  header{display:flex;align-items:center;gap:11px;margin-bottom:14px;}
  header .ic{font-size:26px;}
  h1{font-size:21px;margin:0;font-weight:700;}
  .sub{color:var(--sub);font-size:12px;}
  .me{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);
      border-radius:12px;padding:8px 12px;margin-bottom:16px;}
  .me label{color:var(--sub);font-size:13px;white-space:nowrap;}
  .me input{flex:1;border:0;background:transparent;color:var(--txt);font-size:15px;outline:none;}
  .counts{display:flex;gap:8px;margin-bottom:14px;}
  .pill{flex:1;text-align:center;background:var(--card);border:1px solid var(--line);
        border-radius:11px;padding:9px 4px;font-size:12px;color:var(--sub);}
  .pill b{display:block;font-size:20px;color:var(--txt);}
  .pill.r b{color:var(--red);} .pill.a b{color:var(--amber);} .pill.p b{color:var(--slate);}
  .card{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--amber);
        border-radius:13px;padding:14px;margin-bottom:13px;transition:opacity .3s,transform .3s,background .3s;}
  .card.pend{border-left-color:var(--red);}
  .card.and{border-left-color:var(--amber);}
  .card.paus{border-left-color:var(--slate);}
  .card .top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
  .card .loc{font-size:18px;font-weight:700;}
  .card .tag{font-size:12px;font-weight:700;white-space:nowrap;}
  .tag.u{color:var(--red);} .tag.n{color:var(--sub);}
  .card .prob{font-size:15px;color:#cfd7e2;margin:5px 0 6px;line-height:1.35;}
  .card .info{font-size:12px;color:var(--sub);margin-bottom:11px;}
  .card .motivo{font-size:13px;color:var(--slate);background:rgba(125,138,163,.12);
                border-radius:8px;padding:7px 10px;margin:0 0 11px;}
  .card .motivo b{color:#aab6cc;}
  .acts{display:grid;gap:8px;}
  .acts.n3{grid-template-columns:1fr 1fr 1fr;}
  .acts.n2{grid-template-columns:1fr 1fr;}
  .acts.n1{grid-template-columns:1fr;}
  .btn{padding:12px 6px;border:1px solid var(--line);border-radius:11px;font-size:14px;font-weight:700;
       cursor:pointer;background:#1c2330;color:var(--txt);transition:transform .07s,opacity .2s;}
  .btn:active{transform:scale(.96);}
  .btn.go{background:rgba(255,193,77,.13);border-color:var(--amber);color:var(--amber);}
  .btn.pause{background:rgba(125,138,163,.14);border-color:var(--slate);color:#aab6cc;}
  .btn.done{background:rgba(76,208,125,.14);border-color:var(--green);color:var(--green);}
  .card.busy{opacity:.55;pointer-events:none;}
  .card.flash{background:rgba(76,208,125,.16);border-color:var(--green);border-left-color:var(--green);}
  .card.flash .acts,.card.flash .info,.card.flash .motivo{display:none;}
  .card.flash .done-msg{display:block;color:var(--green);font-weight:700;font-size:15px;margin-top:6px;}
  .done-msg{display:none;}
  .card.gone{opacity:0;transform:translateX(40px);max-height:0;margin:0;padding-top:0;padding-bottom:0;overflow:hidden;}
  .empty{text-align:center;color:#5a6472;font-size:15px;padding:46px 10px;}
  .empty .big{font-size:42px;display:block;margin-bottom:10px;}
  /* resolvidos hoje */
  .resolv{margin-top:8px;border-top:1px solid var(--line);padding-top:14px;}
  .resolv h3{font-size:13px;color:var(--sub);margin:0;cursor:pointer;display:flex;
             justify-content:space-between;align-items:center;font-weight:700;}
  .resolv h3 .ch{color:var(--green);}
  .resolv .lista{margin-top:10px;display:none;}
  .resolv.open .lista{display:block;}
  .resolv .item{font-size:13px;color:var(--sub);padding:7px 0;border-bottom:1px solid #1b2230;}
  .resolv .item b{color:#cfd7e2;}
  footer{margin-top:14px;text-align:center;font-size:11px;color:#5a6472;}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(80px);
         background:#10331f;color:var(--green);border:1px solid var(--green);padding:11px 18px;
         border-radius:11px;font-size:14px;font-weight:600;opacity:0;transition:all .25s;z-index:30;}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
  /* folha de pausa */
  .sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;
            transition:opacity .2s;z-index:40;}
  .sheet-bg.show{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--line);
         border-radius:18px 18px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));
         transform:translateY(110%);transition:transform .25s;z-index:50;max-width:560px;margin:0 auto;}
  .sheet.show{transform:translateY(0);}
  .sheet h3{margin:0 0 4px;font-size:17px;}
  .sheet p{margin:0 0 12px;font-size:13px;color:var(--sub);}
  .sheet textarea{width:100%;min-height:84px;border-radius:11px;border:1px solid var(--line);
    background:var(--bg);color:var(--txt);font-size:15px;padding:12px;outline:none;resize:vertical;}
  .sheet textarea:focus{border-color:var(--slate);}
  .sheet .sheet-acts{display:grid;grid-template-columns:1fr 1.3fr;gap:10px;margin-top:14px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="ic">🛠️</span>
    <div><h1>Manutenção</h1><div class="sub">Hotel Rotorua Inn · chamados</div></div>
  </header>

  <div class="me">
    <label>Você é:</label>
    <input id="me" placeholder="seu nome" autocomplete="off">
  </div>

  <div class="counts">
    <div class="pill r"><b id="c-pend">0</b>pendentes</div>
    <div class="pill a"><b id="c-and">0</b>em andamento</div>
    <div class="pill p"><b id="c-paus">0</b>pausados</div>
  </div>

  <div id="list"></div>

  <div class="resolv" id="resolv">
    <h3 onclick="document.getElementById('resolv').classList.toggle('open')">
      <span><span class="ch">✓</span> Resolvidos hoje (<span id="c-res">0</span>)</span>
      <span class="ch">▾</span>
    </h3>
    <div class="lista" id="lista-res"></div>
  </div>

  <footer>atualiza sozinho · <span id="status">carregando…</span></footer>
</div>

<div class="toast" id="toast"></div>
<div class="sheet-bg" id="sheetBg" onclick="fecharSheet()"></div>
<div class="sheet" id="sheet">
  <h3>Pausar chamado <span id="sheetId"></span></h3>
  <p>Por que está pausando? (ex: falta de material, aguardando peça)</p>
  <textarea id="motivo" placeholder="motivo da pausa"></textarea>
  <div class="sheet-acts">
    <button class="btn" onclick="fecharSheet()">Cancelar</button>
    <button class="btn pause" onclick="confirmarPausa()">Confirmar pausa</button>
  </div>
</div>

<script>
// === LIGAÇÃO ===
// Lê os chamados (gviz). Para mudar status, reaproveita o MESMO formulário da recepção:
// marca a linha como "__UPDATE__" e poe "id|acao|quem|obs" no problema. O servidor (cron 1min)
// le, aplica e apaga a marcação. Sem Apps Script novo.
const SHEET_ID  = "1ADR5V0QzwKopeke4DBPJXaRT4vWf-bbOE3J7O_AU--A";
const SHEET_NAME= "CHAMADOS";
const FORM = "https://docs.google.com/forms/d/e/1FAIpQLSeZPm6OjWwJ1ynSZR_-NPw6UsR9q7Vw9Q_7UNazfwoddYsEJg/formResponse";
const E = { local:"entry.932192929", problema:"entry.1559822300", urgencia:"entry.694324571", solicitante:"entry.272119414" };
const MARCA = "__UPDATE__";

const $ = s => document.getElementById(s);
const meInput = $("me");
meInput.value = localStorage.getItem("manut_nome") || "";
meInput.addEventListener("input", ()=> localStorage.setItem("manut_nome", meInput.value.trim()));

function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function val(r,i){ const c=r.c[i]; return c && c.v!=null ? (""+c.v).trim() : ""; }
function isUrg(u){ return (u||"").toLowerCase().indexOf("urg")>=0; }
function key(s){ s=(s||"").toLowerCase();
  return s.indexOf("resolv")>=0?"res":s.indexOf("paus")>=0?"paus":s.indexOf("andamento")>=0?"and":"pend"; }
function hojeDM(){ const d=new Date(); return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0"); }

// otimista "grudento": mantém a mudança na tela até a planilha confirmar; expira em 3 min.
const pending = {};   // id -> { status, obs, t }
function aplicarPend(o){
  const p = pending[o.id]; if(!p) return o;
  if(Date.now()-p.t > 180000){ delete pending[o.id]; return o; }
  if(key(o.status)===key(p.status)){ delete pending[o.id]; return o; }   // confirmado
  return Object.assign({}, o, { status:p.status, obs:(p.obs!=null&&p.obs!=="")?p.obs:o.obs });
}

function render(objs){
  const todos = objs.filter(o=>o.local!==MARCA).map(aplicarPend);
  const abertos = todos.filter(o=>["pend","and","paus"].indexOf(key(o.status))>=0);
  const ordem = { pend:0, and:1, paus:2 };
  abertos.sort((a,b)=>{
    const ua=isUrg(a.urgencia)?0:1, ub=isUrg(b.urgencia)?0:1; if(ua!==ub) return ua-ub;
    return ordem[key(a.status)]-ordem[key(b.status)];
  });
  $("c-pend").textContent = abertos.filter(o=>key(o.status)==="pend").length;
  $("c-and").textContent  = abertos.filter(o=>key(o.status)==="and").length;
  $("c-paus").textContent = abertos.filter(o=>key(o.status)==="paus").length;
  $("list").innerHTML = abertos.length
    ? abertos.map(card).join("")
    : '<div class="empty"><span class="big">✅</span>Tudo em dia, nenhum chamado aberto.</div>';

  // resolvidos hoje
  const res = todos.filter(o=>key(o.status)==="res" && (o.resolvido||"").indexOf(hojeDM())===0);
  $("c-res").textContent = res.length;
  $("lista-res").innerHTML = res.length
    ? res.map(o=>'<div class="item"><b>'+esc(o.local||"-")+'</b> · '+esc(o.problema||"")
        +' <span style="float:right">'+esc(o.resolvido||"")+' · '+esc(o.responsavel||"-")+'</span></div>').join("")
    : '<div class="item">nenhum ainda hoje</div>';

  $("status").textContent = "atualizado " + new Date().toLocaleTimeString("pt-BR");
}

function card(o){
  const k = key(o.status);
  const cls = k==="paus"?"paus":k==="and"?"and":"pend";
  const tag = isUrg(o.urgencia) ? '<span class="tag u">🔴 Urgente</span>' : '<span class="tag n">Normal</span>';
  const info = k==="paus" ? ("pausado · "+(o.responsavel||"-"))
            : k==="and"  ? ("desde "+(o.inicio||o.aberto||"")+" · "+(o.responsavel||"-"))
            :              ("aberto "+(o.aberto||"")+" · "+(o.solicitante||"recepção"));
  const motivo = (k==="paus" && o.obs) ? '<div class="motivo"><b>Pausa:</b> '+esc(o.obs)+'</div>' : '';
  let acts;
  if(k==="pend"){
    acts = '<div class="acts n3">'
      +'<button class="btn go" onclick="acao(\''+o.id+'\',\'Em andamento\')">▶ Comecei</button>'
      +'<button class="btn pause" onclick="pedirPausa(\''+o.id+'\')">⏸ Pausar</button>'
      +'<button class="btn done" onclick="acao(\''+o.id+'\',\'Resolvido\')">✓ Resolver</button></div>';
  } else if(k==="and"){
    acts = '<div class="acts n2">'
      +'<button class="btn pause" onclick="pedirPausa(\''+o.id+'\')">⏸ Pausar</button>'
      +'<button class="btn done" onclick="acao(\''+o.id+'\',\'Resolvido\')">✓ Resolver</button></div>';
  } else { // pausado
    acts = '<div class="acts n2">'
      +'<button class="btn go" onclick="acao(\''+o.id+'\',\'Em andamento\')">▶ Retomar</button>'
      +'<button class="btn done" onclick="acao(\''+o.id+'\',\'Resolvido\')">✓ Resolver</button></div>';
  }
  return '<div class="card '+cls+'" data-id="'+esc(o.id)+'">'
    +'<div class="top"><div class="loc">'+esc(o.local||"-")+'</div>'+tag+'</div>'
    +'<div class="prob">'+esc(o.problema||"")+'</div>'+motivo
    +'<div class="info">#'+esc(o.id)+' · '+esc(info)+'</div>'+acts
    +'<div class="done-msg">✓ Resolvido</div></div>';
}

function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2200); }

// folha de pausa
let pausaId = null;
function pedirPausa(id){ pausaId=id; $("sheetId").textContent="#"+id; $("motivo").value="";
  $("sheetBg").classList.add("show"); $("sheet").classList.add("show");
  setTimeout(()=>$("motivo").focus(), 250); }
function fecharSheet(){ $("sheetBg").classList.remove("show"); $("sheet").classList.remove("show"); pausaId=null; }
function confirmarPausa(){ const m=$("motivo").value.trim();
  if(!m){ $("motivo").focus(); return; }
  const id=pausaId; fecharSheet(); acao(id,"Pausado",m); }

function acao(id, novo, obs){
  obs = obs || "";
  const cardEl = document.querySelector('.card[data-id="'+id+'"]');
  const quem = meInput.value.trim() || "Manutenção";
  pending[id] = { status:novo, obs:obs, t:Date.now() };
  if(cardEl){
    cardEl.classList.add("busy");
    if(novo==="Resolvido"){
      cardEl.classList.remove("busy"); cardEl.classList.add("flash");        // verde de confirmação
      setTimeout(()=>cardEl.classList.add("gone"), 1300);
    }
  }
  const body = new URLSearchParams();
  body.append(E.local, MARCA);
  body.append(E.problema, id+"|"+novo+"|"+quem+(obs?("|"+obs):""));
  body.append(E.urgencia, "Normal");
  body.append(E.solicitante, quem);
  fetch(FORM, { method:"POST", mode:"no-cors", body }).finally(()=>{
    toast(novo==="Resolvido" ? "Chamado #"+id+" resolvido ✓"
        : novo==="Pausado"   ? "Chamado #"+id+" pausado ⏸"
        :                      "Chamado #"+id+" em andamento ▶");
    setTimeout(carregar, 2500);
  });
}

window.__gvizcb = function(resp){
  try{
    const rows=(resp.table&&resp.table.rows)||[]; const objs=[];
    rows.forEach(r=>{ if(!r||!r.c) return;
      if(val(r,0).toLowerCase()==="id") return;
      const status=val(r,6); if(!status) return;
      objs.push({ id:val(r,0), aberto:val(r,1), local:val(r,2), problema:val(r,3),
                  urgencia:val(r,4), solicitante:val(r,5), status:status,
                  responsavel:val(r,7), inicio:val(r,8), resolvido:val(r,9), obs:val(r,10) }); });
    render(objs);
  }catch(e){ $("status").textContent="erro ao ler a planilha"; }
};
function carregar(){
  const old=$("gvizscript"); if(old) old.remove();
  const s=document.createElement("script"); s.id="gvizscript";
  s.onerror=()=>{ $("status").textContent="sem conexão com a planilha"; };
  s.src="https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/gviz/tq?tqx=out:json;responseHandler:__gvizcb&sheet="+SHEET_NAME+"&_="+Date.now();
  document.head.appendChild(s);
}
carregar(); setInterval(carregar, 15000);
</script>
</body>
</html>
